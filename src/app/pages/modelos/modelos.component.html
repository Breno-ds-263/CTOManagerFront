<h2>Cadastro de Modelos</h2>

<div>
  <input [(ngModel)]="novoModelo.nome" placeholder="Nome">
  <input [(ngModel)]="novoModelo.fabricante" placeholder="Fabricante">
  <button (click)="salvar()">Cadastrar</button>
</div>

<hr>

<h3>Lista de Modelos</h3>

<ul>
  <li *ngFor="let m of modelos">
    {{ m.nome }} - {{ m.fabricante }}
    <button (click)="excluir(m.id!)">Excluir</button>
  </li>
</ul>
